name: Python Testing
on: [push, pull_request] # Runs on every push or PR

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pytest
          # Add other libs here like: pip install numpy laspy
      - name: Run tests
        run: pytest